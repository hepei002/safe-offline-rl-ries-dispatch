schema_version: 1.0
environment:
  id: IntegratedEnergyEnv-v0
  episode_hours: 24
  timestep_hours: 1
  action_space:
    type: Box
    low: -1.0
    high: 1.0
    shape: [4]
    names:
      - chp_electric_fraction
      - heat_pump_heat_fraction
      - battery_power_fraction
      - thermal_power_fraction
  observation_space:
    type: Box
    shape: [10]
    names:
      - electric_load_norm
      - heat_load_norm
      - pv_available_norm
      - wind_available_norm
      - cop_norm
      - import_price_norm
      - battery_soc_norm
      - thermal_soc_norm
      - hour_sin
      - hour_cos
  reward: negative_one_hour_operating_cost_eur
  terminated: after_episode_hours
  truncated: false_by_default
